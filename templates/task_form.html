{% extends "base.html" %}

{% block title %}New Task - {{ project.name }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-10">
        <div class="card shadow">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5>New Task for "{{ project.name }}"</h5>
                <a href="{{ url_for('project_detail', project_id=project.id) }}" class="btn btn-secondary">← Back</a>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Title *</label>
                        <input type="text" class="form-control" name="title" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea class="form-control" name="description" rows="3"></textarea>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Assign to *</label>
                            <select name="assigned_to_id" class="form-select" required>
                                {% for user in users %}
                                <option value="{{ user.id }}">{{ user.username }} ({{ user.role }})</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Status</label>
                            <select name="status" class="form-select">
                                <option value="Pending">Pending</option>
                                <option value="In Progress">In Progress</option>
                                <option value="Done">Done</option>
                            </select>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Due Date *</label>
                        <input type="date" class="form-control" name="due_date" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100">Create Task</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
